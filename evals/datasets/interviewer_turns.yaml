version: "2026-06-08.1"
description: "Added partial-answer-next-scripted probe case: respondent surface-touches NEXT_SCRIPTED topic, interviewer must probe deeper rather than skip_scripted"

# Tier 1 interviewer dataset — 35 single-turn decisions.
#
# Each case seeds a minimal DB (scripted_questions, prior_turns, probes) and
# hands the agent a `last_respondent` utterance. `expected_output.action` is
# what a well-behaved interviewer should choose.
#
# STRUCTURAL INVARIANT: `last_respondent` MUST equal the text of the last
# respondent entry in `prior_turns`. In the live Vapi webhook, the custom-LLM
# endpoint receives body["messages"] which is the full transcript including the
# respondent's latest turn — the last message IS already in the history.
# Violating this produces a state the real interviewer never sees.
#
# ANALYST LAG PATTERN (analyst probe cases):
# Analyst runs async after the scripted cursor advances or every ~10 turns.
# It reads the transcript at time T, generates probes, then writes them to DB.
# By the time probes appear, the interviewer has already taken 2-4 more turns.
# So: probe question references an OLDER turn (the signal), while
# `last_respondent` is the LATEST turn (unrelated to the probe topic).
# The interviewer must break from the current thread to use the probe.
#
# probe_source field on expected_output:
#   "analyst"     — model must pick a probe from the pre-seeded PENDING_PROBES
#   "interviewer" — model must fire a spontaneous probe (probes: [] in inputs)
#   (omitted)     — source not checked; used for non-probe actions
#
# Coverage: probe x17 (analyst x10, interviewer x7), scripted x5, clarify x5,
#           wrap_up x5, off_topic x2, skip_scripted x2.

cases:
  # --- probe (analyst flagged something worth digging into) ---------------
  # Signal is 3-5 turns back. The conversation continued on a different thread.
  # The interviewer must recognize the waiting probe and pivot to it.

  - name: priority_1_probe_beats_scripted
    # Signal: "lost visibility on a key metric for three weeks" (turn 6)
    # Analyst ran after scripted cursor advanced at turn 6, probe arrived ~turn 8
    # Turns 7-10: interviewer moved to day-to-day usage thread
    # Now at turn 10: last respondent answered the workflow question
    inputs:
      scripted_questions:
        - Can you tell me about your role and what your team does?
        - How long has your team been using the product?
        - Before this, what were you using and what prompted the switch?
        - Walk me through how your team actually uses it day-to-day.
        - What's been the biggest impact on your workflow?
        - What do you wish it did better?
        - On a scale of 1 to 10, how likely are you to recommend it to a colleague?
        - Who else at your company might benefit from it?
      prior_turns:
        - {speaker: interviewer, text: "Can you tell me about your role and what your team does?", action: scripted}
        - {speaker: respondent, text: "I'm a product manager at a mid-size SaaS company. My team owns the core product analytics workflow."}
        - {speaker: interviewer, text: "How long has your team been using the product?", action: scripted}
        - {speaker: respondent, text: "About eight months now, around twelve people use it regularly."}
        - {speaker: interviewer, text: "Before this, what were you using and what prompted the switch?", action: scripted}
        - {speaker: respondent, text: "Spreadsheets and a homegrown Notion setup. The switch happened after a bad quarter where we lost visibility on a key metric for three weeks — nobody noticed until a board meeting."}
        - {speaker: interviewer, text: "Walk me through how your team actually uses it day-to-day.", action: scripted}
        - {speaker: respondent, text: "Mostly the analytics dashboards. We run a standup every morning off the main dashboard."}
        - {speaker: interviewer, text: "What's been the biggest impact on your workflow?", action: scripted}
        - {speaker: respondent, text: "Honestly just having one source of truth. Before, everyone had their own spreadsheet and they never matched."}
      probes:
        - {question: "Earlier you mentioned losing visibility on a key metric for three weeks — what was that metric and what broke?", priority: 1, rationale: "Root cause of the buying trigger; surfaces the specific pain that closed the deal."}
        - {question: "You said nobody noticed until the board meeting — how did that go?", priority: 2, rationale: "Consequence of the visibility gap; helps size urgency of the original pain."}
      last_respondent: "Honestly just having one source of truth. Before, everyone had their own spreadsheet and they never matched."
    expected_output:
      action: probe
      probe_source: analyst

  - name: priority_2_probe_still_beats_scripted
    # Signal: "came from a competitor that got too expensive" (turn 4)
    # Analyst ran after scripted cursor advanced; probe arrived ~turn 6
    # Turns 5-8: interviewer moved to feature satisfaction thread
    inputs:
      scripted_questions:
        - Can you tell me about your role?
        - How long have you been using it?
        - What do you like most about it?
        - What frustrates you most?
        - Would you recommend it?
      prior_turns:
        - {speaker: interviewer, text: "Can you tell me about your role and what your team does?", action: scripted}
        - {speaker: respondent, text: "I run growth at a B2B startup. Small team — five of us."}
        - {speaker: interviewer, text: "How long have you been using the product?", action: scripted}
        - {speaker: respondent, text: "About four months. We came from a competitor that got too expensive."}
        - {speaker: interviewer, text: "What do you like most about it?", action: scripted}
        - {speaker: respondent, text: "The price, honestly. Not much else stands out."}
        - {speaker: interviewer, text: "What frustrates you most?", action: scripted}
        - {speaker: respondent, text: "The reporting is pretty limited. We end up exporting to spreadsheets a lot."}
      probes:
        - {question: "You mentioned switching from a competitor that got too expensive — what were you paying, roughly?", priority: 2, rationale: "Pricing displacement signal; helps size the competitive cost gap."}
      last_respondent: "The reporting is pretty limited. We end up exporting to spreadsheets a lot."
    expected_output:
      action: probe
      probe_source: analyst

  - name: contradiction_probe_after_flip
    # Signal: contradiction between "community integrations sold us" (turn 6)
    # and "never really cared about the community part" (turn 8)
    # Analyst caught this contradiction; probe arrived ~turn 10
    # Turns 9-12: interviewer moved to workflow impact thread
    inputs:
      scripted_questions:
        - Tell me about your role and team.
        - How long have you been using the product?
        - What originally drew you to it?
        - How has your usage changed over time?
        - What's been the biggest impact?
        - What do you wish it did better?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and team.", action: scripted}
        - {speaker: respondent, text: "I'm a CS lead at a fintech startup, team of eight."}
        - {speaker: interviewer, text: "How long have you been using the product?", action: scripted}
        - {speaker: respondent, text: "About a year and a half now."}
        - {speaker: interviewer, text: "What originally drew you to it?", action: scripted}
        - {speaker: respondent, text: "It was the community — all the integrations the community had built. That's what sold us."}
        - {speaker: interviewer, text: "How has your usage changed over time?", action: scripted}
        - {speaker: respondent, text: "Honestly? I never really cared about the community part. We barely use any of those integrations."}
        - {speaker: interviewer, text: "What's been the biggest impact on your team?", action: scripted}
        - {speaker: respondent, text: "Just the speed. We resolve tickets about thirty percent faster than before."}
        - {speaker: interviewer, text: "What do you wish it did better?", action: scripted}
        - {speaker: respondent, text: "The search is pretty weak. Hard to find old tickets."}
      probes:
        - {question: "Earlier you mentioned the community integrations were what sold you — but then said you never really cared about them. What's the story there?", priority: 1, rationale: "Direct contradiction between turns 6 and 8; the stated buying reason doesn't match actual usage."}
      last_respondent: "The search is pretty weak. Hard to find old tickets."
    expected_output:
      action: probe
      probe_source: analyst

  - name: probe_after_detailed_anecdote
    # Signal: "rerouted forty drivers in three minutes, used to take two hours" (turn 6)
    # Analyst ran after scripted cursor advanced; probe arrived ~turn 8
    # Turns 7-10: interviewer continued with feature satisfaction thread
    inputs:
      scripted_questions:
        - Tell me about your role.
        - How long have you been using it?
        - Walk me through the last time you used it.
        - What features do you use most?
        - What do you wish it did better?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I'm an ops manager at a logistics company. We coordinate about forty drivers across three cities."}
        - {speaker: interviewer, text: "How long have you been using the product?", action: scripted}
        - {speaker: respondent, text: "Eleven months. We went live after a two-week onboarding."}
        - {speaker: interviewer, text: "Walk me through the last time you used it.", action: scripted}
        - {speaker: respondent, text: "Last Tuesday a highway closure came in and the system rerouted all forty drivers automatically within about three minutes. That used to take us two hours on the phone."}
        - {speaker: interviewer, text: "What features do you rely on most day-to-day?", action: scripted}
        - {speaker: respondent, text: "Mostly the live map and the alerts. The driver app is good too."}
        - {speaker: interviewer, text: "What do you wish it did better?", action: scripted}
        - {speaker: respondent, text: "Better integration with our dispatch software. We still have to manually copy some data."}
      probes:
        - {question: "You mentioned the Tuesday rerouting happened automatically in three minutes — was that fully automatic or did someone trigger it?", priority: 1, rationale: "Automation vs. manual trigger changes the ROI story significantly."}
      last_respondent: "Better integration with our dispatch software. We still have to manually copy some data."
    expected_output:
      action: probe
      probe_source: analyst

  - name: probe_available_vague_answer
    # Signal: "switched from a competitor" — vague, unnamed (turn 4)
    # Analyst flagged the unnamed competitor; probe arrived ~turn 6
    # Turns 5-8: interviewer moved to feature/usage thread
    inputs:
      scripted_questions:
        - Tell me about your role.
        - How long have you been using the product?
        - What features matter most?
        - What would you change?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I'm head of RevOps at a Series B company. We have a sales team of about thirty."}
        - {speaker: interviewer, text: "How long have you been using the product?", action: scripted}
        - {speaker: respondent, text: "About six months — we switched from something else. A competitor."}
        - {speaker: interviewer, text: "What features matter most to your team?", action: scripted}
        - {speaker: respondent, text: "The pipeline visibility and the Salesforce sync. Those two are critical."}
        - {speaker: interviewer, text: "What would you change about it?", action: scripted}
        - {speaker: respondent, text: "The reporting customization is limited. I can't build the exact views I need."}
      probes:
        - {question: "You mentioned switching from a competitor — which one, and what made you switch?", priority: 1, rationale: "Named competitor + switching rationale is a strong displacement signal."}
      last_respondent: "The reporting customization is limited. I can't build the exact views I need."
    expected_output:
      action: probe
      probe_source: analyst

  # --- scripted (no probe available; scripted queue has content) ----------

  - name: no_probe_use_scripted
    inputs:
      scripted_questions:
        - How do you currently use the product?
        - What would you change about it?
        - Who else might benefit from it?
      prior_turns:
        - {speaker: interviewer, text: "Can you tell me about your role and what your team does?", action: scripted}
        - {speaker: respondent, text: "I'm a data analyst at a media company. We use it mostly for dashboarding."}
        - {speaker: interviewer, text: "How do you currently use the product?", action: scripted}
        - {speaker: respondent, text: "I've used it for about a year, mostly on weekdays for commute planning."}
      probes: []
      last_respondent: "I've used it for about a year, mostly on weekdays for commute planning."
    expected_output:
      action: scripted

  - name: first_turn_open_scripted
    inputs:
      scripted_questions:
        - To start, can you tell me a bit about yourself and your role?
        - How long has your team been using the product?
        - How do you currently use it day-to-day?
      prior_turns: []
      probes: []
      last_respondent: "Hi, yeah — ready when you are."
    expected_output:
      action: scripted

  - name: detailed_answer_no_probe_go_scripted
    inputs:
      scripted_questions:
        - Tell me about your role.
        - How often do you use it?
        - What else have you tried?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I'm a software engineer at a startup. We're a team of six."}
        - {speaker: interviewer, text: "How often do you use it?", action: scripted}
        - {speaker: respondent, text: "Most mornings, sometimes evenings when I'm planning a longer trip. Maybe five or six times a week."}
      probes: []
      last_respondent: "Most mornings, sometimes evenings when I'm planning a longer trip. Maybe five or six times a week."
    expected_output:
      action: scripted

  - name: probe_queue_exhausted_back_to_scripted
    inputs:
      scripted_questions:
        - What would make you recommend it?
        - What's the biggest frustration?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role.", action: scripted}
        - {speaker: respondent, text: "I'm a project manager at a consulting firm."}
        - {speaker: interviewer, text: "Earlier you mentioned something felt off with the routing — what happened?", action: probe}
        - {speaker: respondent, text: "The rerouting got me lost one night. I was late for a client dinner. But it's been fine since the update."}
      probes: []
      last_respondent: "The rerouting got me lost one night. I was late for a client dinner. But it's been fine since the update."
    expected_output:
      action: scripted

  - name: clear_complete_answer_advance
    inputs:
      scripted_questions:
        - What would you change about it?
        - Who else might benefit from it?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role.", action: scripted}
        - {speaker: respondent, text: "I'm a designer at a product agency. Team of four."}
        - {speaker: interviewer, text: "What would you change about it?", action: scripted}
        - {speaker: respondent, text: "The onboarding. It took me three attempts to finish signup because the email verification kept expiring."}
      probes: []
      last_respondent: "The onboarding. It took me three attempts to finish signup because the email verification kept expiring."
    expected_output:
      action: scripted

  # --- clarify (genuinely ambiguous or vague one-word answers) ------------

  - name: ambiguous_fine_i_guess
    inputs:
      scripted_questions:
        - Tell me about your role.
        - How do you find the pricing?
        - What would you change?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I'm a founder. Small team — three of us."}
        - {speaker: interviewer, text: "How do you find the pricing?", action: scripted}
        - {speaker: respondent, text: "It's... fine I guess? kind of."}
      probes: []
      last_respondent: "It's... fine I guess? kind of."
    expected_output:
      action: clarify

  - name: one_word_vague
    inputs:
      scripted_questions:
        - Tell me about your role.
        - How do you feel about the recent update?
        - What would you change?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I work in finance at a mid-size company. I use it personally, not for work."}
        - {speaker: interviewer, text: "How do you feel about the recent update?", action: scripted}
        - {speaker: respondent, text: "Mixed."}
      probes: []
      last_respondent: "Mixed."
    expected_output:
      action: clarify

  - name: noncommittal_maybe
    inputs:
      scripted_questions:
        - Tell me about your role.
        - Would you recommend it to a colleague?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I'm an account executive at a SaaS company. Been there two years."}
        - {speaker: interviewer, text: "Would you recommend it to a colleague?", action: scripted}
        - {speaker: respondent, text: "Maybe."}
      probes: []
      last_respondent: "Maybe."
    expected_output:
      action: clarify

  # --- wrap_up (respondent signals end, or nothing left to ask) -----------

  - name: respondent_explicit_done
    inputs:
      scripted_questions:
        - Any final thoughts?
      prior_turns:
        - {speaker: interviewer, text: "Any final thoughts?", action: scripted}
        - {speaker: respondent, text: "I really need to run, sorry."}
      probes: []
      last_respondent: "I really need to run, sorry."
    expected_output:
      action: wrap_up

  - name: nothing_left_to_ask
    inputs:
      scripted_questions:
        - What would you change?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role.", action: scripted}
        - {speaker: respondent, text: "I'm a solo consultant. I use it for personal productivity."}
        - {speaker: interviewer, text: "What would you change?", action: scripted}
        - {speaker: respondent, text: "Honestly nothing major — it works for me. That's really all I've got."}
      probes: []
      last_respondent: "Honestly nothing major — it works for me. That's really all I've got."
    expected_output:
      action: wrap_up

  - name: respondent_leaving_meeting
    inputs:
      scripted_questions:
        - Who else might benefit?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role.", action: scripted}
        - {speaker: respondent, text: "I'm an engineer lead at a startup."}
        - {speaker: interviewer, text: "Who else at your company might benefit from it?", action: scripted}
        - {speaker: respondent, text: "Hey — I've got a meeting in like one minute, I have to hop off."}
      probes: []
      last_respondent: "Hey — I've got a meeting in like one minute, I have to hop off."
    expected_output:
      action: wrap_up

  # --- off_topic (respondent drifts; interviewer should redirect) ---------

  - name: dog_rambler_redirect
    inputs:
      scripted_questions:
        - What features do you use most?
        - What would you change?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I'm a marketing manager. I use the route planner for client visits."}
        - {speaker: interviewer, text: "What features do you use most?", action: scripted}
        - {speaker: respondent, text: "Mostly the route planner. Oh, and my dog Biscuit hates the new update sound."}
        - {speaker: interviewer, text: "Got it — what is it about the route planner you find most useful?", action: probe}
        - {speaker: respondent, text: "They had this whole adoption event — I was only there for coffee but then I saw him and it was all over."}
      probes: []
      last_respondent: "They had this whole adoption event — I was only there for coffee but then I saw him and it was all over."
    expected_output:
      action: off_topic

  - name: politics_tangent_redirect
    inputs:
      scripted_questions:
        - What would make you pay more?
        - Who else might benefit?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role.", action: scripted}
        - {speaker: respondent, text: "I run a small bakery. Use it for delivery routing."}
        - {speaker: interviewer, text: "What would make you pay more for the product?", action: scripted}
        - {speaker: respondent, text: "And don't get me started on what the current administration is doing to small businesses — it's absolutely outrageous, let me tell you about my cousin's bakery..."}
      probes: []
      last_respondent: "And don't get me started on what the current administration is doing to small businesses — it's absolutely outrageous, let me tell you about my cousin's bakery..."
    expected_output:
      action: off_topic

  # --- clarify (silence / filler — no substantive content) -----------------

  - name: true_silence_clarify
    inputs:
      scripted_questions:
        - How do you currently use the product?
        - What would you change about it?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I work in ops at a manufacturing company."}
        - {speaker: interviewer, text: "How do you currently use the product?", action: scripted}
        - {speaker: respondent, text: "[silence]"}
      probes: []
      last_respondent: "[silence]"
    expected_output:
      action: clarify

  - name: thinking_filler_clarify
    inputs:
      scripted_questions:
        - What do you value most about it?
        - Has anything frustrated you?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I'm a developer at a fintech company."}
        - {speaker: interviewer, text: "What do you value most about it?", action: scripted}
        - {speaker: respondent, text: "Um... uh... hmm."}
      probes: []
      last_respondent: "Um... uh... hmm."
    expected_output:
      action: clarify

  # --- probe (investor-relevant triggers, with analyst lag) -----------------

  - name: roi_quantification_probe
    # Signal: "saves us a ton of time and money" (turn 6)
    # Analyst ran after scripted cursor advanced; probe arrived ~turn 8
    # Turns 7-10: interviewer moved to feature/frustration thread
    inputs:
      scripted_questions:
        - Tell me about your role.
        - How long have you been using it?
        - What keeps you coming back?
        - What would you change about it?
        - Would you recommend it?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I'm VP of Sales at a Series A company. Team of fifteen."}
        - {speaker: interviewer, text: "How long have you been using the product?", action: scripted}
        - {speaker: respondent, text: "About ten months. We rolled it out after a rough Q1."}
        - {speaker: interviewer, text: "What keeps you coming back?", action: scripted}
        - {speaker: respondent, text: "It saves us a ton of time and money, honestly."}
        - {speaker: interviewer, text: "What would you change about it?", action: scripted}
        - {speaker: respondent, text: "The mobile app is pretty clunky. My reps complain about it constantly."}
        - {speaker: interviewer, text: "How likely would you be to recommend it to a colleague?", action: scripted}
        - {speaker: respondent, text: "Probably an eight. The core product is solid, just the mobile needs work."}
      probes:
        - {question: "A few minutes ago you mentioned it saves time and money — can you put a rough number on that?", priority: 1, rationale: "ROI quantification is a key investor signal; the claim was made but not substantiated."}
      last_respondent: "Probably an eight. The core product is solid, just the mobile needs work."
    expected_output:
      action: probe
      probe_source: analyst

  - name: competitor_mention_probe
    # Signal: "evaluated Salesforce, thirty-day trial, too expensive" (turn 6)
    # Analyst ran; probe arrived ~turn 9
    # Turns 7-10: interviewer moved to workflow impact thread
    inputs:
      scripted_questions:
        - Tell me about your role.
        - How long have you been using it?
        - Have you tried alternatives?
        - What's been the biggest impact?
        - What would make you switch away?
        - Any final thoughts?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I'm a CTO at a fifty-person company. We run most of our ops on SaaS tools."}
        - {speaker: interviewer, text: "How long have you been using the product?", action: scripted}
        - {speaker: respondent, text: "About fourteen months. We renewed once already."}
        - {speaker: interviewer, text: "Have you tried alternatives?", action: scripted}
        - {speaker: respondent, text: "We evaluated Salesforce but it was way overkill for our team size. Did a thirty-day trial but the implementation cost was too high."}
        - {speaker: interviewer, text: "What's been the biggest impact for your team?", action: scripted}
        - {speaker: respondent, text: "Visibility. Our execs can now pull data themselves instead of asking my team."}
        - {speaker: interviewer, text: "What would make you switch away from it?", action: scripted}
        - {speaker: respondent, text: "If they raised prices significantly, or if a better-integrated option came along."}
      probes:
        - {question: "Earlier you mentioned the Salesforce trial — when you were comparing them, what specific capabilities were you looking at?", priority: 1, rationale: "Named competitor evaluation surfaces differentiation and switching cost."}
      last_respondent: "If they raised prices significantly, or if a better-integrated option came along."
    expected_output:
      action: probe
      probe_source: analyst

  - name: expansion_signal_probe
    # Signal: "thinking about rolling it out company-wide, SSO is the blocker" (turn 6)
    # Analyst ran; probe arrived ~turn 9
    # Turns 7-10: interviewer continued with satisfaction/frustration thread
    inputs:
      scripted_questions:
        - Tell me about your role.
        - How long have you been using it?
        - How is adoption across your team?
        - What would you change about it?
        - Who else might benefit?
      prior_turns:
        - {speaker: interviewer, text: "Tell me about your role and what your team does.", action: scripted}
        - {speaker: respondent, text: "I'm the head of operations at a two-hundred-person company."}
        - {speaker: interviewer, text: "How long have you been using the product?", action: scripted}
        - {speaker: respondent, text: "About seven months. Started as a small pilot."}
        - {speaker: interviewer, text: "How is adoption across your team?", action: scripted}
        - {speaker: respondent, text: "Just our small ops team right now, but I've been thinking about rolling it out to the whole company. If the enterprise tier had better SSO support, I'd push for it tomorrow."}
